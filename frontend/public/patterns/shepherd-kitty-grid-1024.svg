<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#f3ede4"/>

  <defs>
    <!-- Small German shepherd face icon -->
    <g id="shepherd-face" transform="scale(0.95)">
      <!-- ears -->
      <path d="M-44 -52 L-62 -102 L-22 -74 Z" fill="#3f2e24"/>
      <path d="M44 -52 L62 -102 L22 -74 Z" fill="#3f2e24"/>
      <path d="M-44 -55 L-54 -88 L-31 -72 Z" fill="#c79b78"/>
      <path d="M44 -55 L54 -88 L31 -72 Z" fill="#c79b78"/>

      <!-- head -->
      <ellipse cx="0" cy="-8" rx="62" ry="58" fill="#6b4b38"/>
      <ellipse cx="0" cy="16" rx="44" ry="34" fill="#c79b78"/>

      <!-- cheeks -->
      <ellipse cx="-34" cy="8" rx="14" ry="13" fill="#c79b78"/>
      <ellipse cx="34" cy="8" rx="14" ry="13" fill="#c79b78"/>

      <!-- eyes -->
      <ellipse cx="-20" cy="-16" rx="5.2" ry="4.3" fill="#201814"/>
      <ellipse cx="20" cy="-16" rx="5.2" ry="4.3" fill="#201814"/>

      <!-- nose -->
      <ellipse cx="0" cy="10" rx="8" ry="6.2" fill="#201814"/>
    </g>

    <!-- Small cat face shadow/silhouette icon -->
    <g id="kitty-shadow" fill="#b8a091">
      <!-- ears -->
      <path d="M-34 -38 L-48 -70 L-20 -48 Z"/>
      <path d="M34 -38 L48 -70 L20 -48 Z"/>
      <!-- head -->
      <circle cx="0" cy="-2" r="44"/>
      <!-- tiny cutout suggestion for nose area -->
      <ellipse cx="0" cy="10" rx="5.2" ry="3.8" fill="#f3ede4"/>
    </g>
  </defs>

  <!-- 4x4 centered alternating grid -->
  <use href="#shepherd-face" x="128" y="128"/>
  <use href="#kitty-shadow" x="384" y="128"/>
  <use href="#shepherd-face" x="640" y="128"/>
  <use href="#kitty-shadow" x="896" y="128"/>

  <use href="#kitty-shadow" x="128" y="384"/>
  <use href="#shepherd-face" x="384" y="384"/>
  <use href="#kitty-shadow" x="640" y="384"/>
  <use href="#shepherd-face" x="896" y="384"/>

  <use href="#shepherd-face" x="128" y="640"/>
  <use href="#kitty-shadow" x="384" y="640"/>
  <use href="#shepherd-face" x="640" y="640"/>
  <use href="#kitty-shadow" x="896" y="640"/>

  <use href="#kitty-shadow" x="128" y="896"/>
  <use href="#shepherd-face" x="384" y="896"/>
  <use href="#kitty-shadow" x="640" y="896"/>
  <use href="#shepherd-face" x="896" y="896"/>
</svg>

